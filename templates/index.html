<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            min-height: 100vh;
            color: white;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-weight: 600;
        }

        .subtitle {
            color: #ddd;
            margin-bottom: 25px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            background: linear-gradient(135deg, #ff512f, #dd2476);
            border: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .result-card {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.15);
        }

        .badge-result {
            font-size: 1rem;
            padding: 10px 15px;
            border-radius: 20px;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
            max-height: 300px;
        }
    </style>
</head>

<body>

<div class="main-container">
    <div class="glass-card text-center">

        <h1>Brain Tumor Detection</h1>
        <p class="subtitle">Upload MRI image to detect tumor type</p>

        <!-- Upload Form -->
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3 text-start">
                <label class="form-label">Select MRI Image</label>
                <input type="file" class="form-control" name="file" id="fileInput" accept="image/*" required>
            </div>

            <button type="submit" class="btn btn-custom w-100">
                Analyze Image
            </button>
        </form>

        <!-- Image Preview -->
        <img id="preview" class="img-fluid d-none"/>

        {% if result %}
        <!-- Result Section -->
        <div class="result-card mt-4">

            <h4 class="mb-3">Prediction Result</h4>

            <!-- Result Badge -->
            <span class="badge bg-success badge-result">{{ result }}</span>

            <p class="mt-2">Confidence: <strong>{{ confidence }}</strong></p>

            <!-- Uploaded Image -->
            <img src="{{ file_path }}" class="img-fluid">

        </div>
        {% endif %}

    </div>
</div>

<!-- Image Preview Script -->
<script>
    const input = document.getElementById("fileInput");
    const preview = document.getElementById("preview");

    input.addEventListener("change", function() {
        const file = this.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.classList.remove("d-none");
        }
    });
</script>

</body>
</html>
